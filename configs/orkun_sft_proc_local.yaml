# Orkun SFT procédural — réchauffe le pretrain 80M Orkish sur un corpus procédural
# vérifié (oracles GoalFamily exécutés dans la vraie sandbox), pour franchir le mur
# format cold-start avant le self-play RLVR. Corpus = même distribution que le self-play.
# Init depuis l'ema pretrain (PAS le best distill sous-entraîné). Sorties côté ORKUN.
name: orkun_sft_procedural

model:
  vocab_size: 8192
  dim: 832
  n_layers: 12
  n_heads: 13
  n_kv_heads: 1
  head_dim: 64
  mlp_hidden: 2496
  max_seq_len: 2048
  rope_base: 100000.0
  logit_softcap: 15.0
  tie_embeddings: false
  stomach_tokens: 32

data:
  train_path: ./orkun/data/sft_proc/sft_proc_train.npz
  val_path: ./orkun/data/sft_proc/sft_proc_val.npz

train:
  precision: fp32              # MPS bf16 autocast -> NaN grads (nGPT l2norm+u*u)
  init_from: ../Orkish/out_final/run/ckpts/ema.safetensors
  total_steps: 160            # LOCAL learning-signal run (~budget du distill 180); full 720 -> Kaggle T4
  micro_batch: 4
  grad_accum: 8                # effective 32 seqs x 1408
  clip_grad_norm: 1.0
  boss:
    every: 4
  seed: 42

optim:
  adamw:
    lr: 0.00001
    betas: [0.9, 0.95]
    weight_decay: 0.0
  schedule:
    type: wsd
    warmup_frac: 0.1
    decay_frac: 0.2
    min_lr_ratio: 0.1

logging:
  every: 5
  val_every: 80
  health_every: 50
  ckpt_every: 120
  out_dir: ./runs/sft_proc_local
  keep_last: 3
