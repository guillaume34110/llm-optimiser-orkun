# Orkun SFT procédural V3 — réchauffe le backbone WAAAGH 1.1 sur un corpus procédural
# vérifié (oracles GoalFamily exécutés dans la vraie sandbox), pour franchir le mur
# format cold-start avant le self-play RLVR. Corpus = même distribution que le self-play.
#
# V3 vs V2 (post-mortem run V2, best_val 1.7837 mais binding d'opérandes absent):
#   - oracles copy-only (compute/pipeline ne stashent plus de constantes non-dérivables)
#   - famille echo (gradient concentré sur la copie prompt→call) + entropie élargie partout
#   - corpus ~16k traces (vs 5.7k), 1800 steps ≈ 3.8 epochs (vs 6.7 → mémorisation)
#   - npz repackés avec le fix loss-mask 06-10 (assistant + <|eos|> + <|user|> fin de CALL)
#   - init = poids RAW dernier step_*.safetensors (v11 si dispo, sinon step_1100 1.0 —
#     un ckpt 1.0 charge dans l'archi 1.1, organes zero-init = forward identique).
#     PAS l'ema (en retard sur le run 1.0: val 4.50 vs 4.21, cf orkun-handoff.md).
name: orkun_sft_procedural

model:
  vocab_size: 8192
  dim: 832
  n_layers: 12
  n_heads: 13
  n_kv_heads: 1
  head_dim: 64
  mlp_hidden: 2496
  max_seq_len: 2048
  rope_base: 100000.0
  logit_softcap: 15.0
  tie_embeddings: false
  stomach_tokens: 32
  attn_backend: sdpa           # flex unfused sur T4 sm_75 = pathologique
  # Organes WAAAGH 1.1 — obligatoires pour charger un ckpt v11 (sinon unexpected keys).
  # Avec un ckpt 1.0: clés absentes → gates restent à zéro = forward 1.0 identique.
  dyn_alpha: true
  value_residual: true
  stomach_write: true
  stomach_segments: 2          # seq 768 → 384+384, une écriture stomach/seq

data:
  train_path: ./orkun/data/sft_proc/sft_proc_train.npz
  val_path: ./orkun/data/sft_proc/sft_proc_val.npz

train:
  precision: fp32              # MPS bf16 autocast -> NaN grads (nGPT l2norm+u*u)
  init_from: ../Orkish/out_final/run/ckpts/best.safetensors
  total_steps: 3000            # V4: ~16k traces @ eff-batch 32 ≈ 6.4 epochs (~6.7h T4 fp32 @ seq 768)
  # V4 post-mortem run V3 (best_val 1.543, format PARFAIT mais copie prompt→call ABSENTE,
  # greedy 0/9 familles): mask/arch/load tous corrects (digits du span assistant supervisés,
  # organes zero-init = forward 1.0 identique). Symptôme = induction head pas encore émergée
  # (sous-entraînement), PAS un bug. val_loss encore en descente à 1799 (1.5444→1.5432).
  # Leviers (par confiance): (1) LR — 1e-5→plateau 2.855, 3e-5→1.543 : encore loin de l'optimum,
  # nGPT+fp32+clip tolèrent le haut LR ; (2) plus d'epochs — pas d'overfit (train≈val, nombres
  # held-out aléatoires = copie impossible à mémoriser). V4: lr 3e-5→5e-5, steps 1800→3000.
  micro_batch: 4
  grad_accum: 8                # effective 32 seqs x 768 (seq 1408→768: max trace 652, 84% padding tué)
  clip_grad_norm: 1.0
  boss:
    every: 4
  seed: 42

optim:
  adamw:
    lr: 0.00005               # 5e-5 V4 (1e-5→plateau 2.855 ; 3e-5→1.543 ; encore LR-limité.
                              #         nGPT hypersphère + fp32 + clip 1.0 = robuste au haut LR)
    betas: [0.9, 0.95]
    weight_decay: 0.0
  schedule:
    type: wsd
    warmup_frac: 0.1
    decay_frac: 0.2
    min_lr_ratio: 0.1

logging:
  every: 5
  val_every: 20
  health_every: 50
  ckpt_every: 120
  out_dir: ./runs/sft_procedural
  keep_last: 3
