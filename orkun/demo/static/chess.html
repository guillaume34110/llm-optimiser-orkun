<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WAAAGH · GROT joue aux échecs</title>
<style>
  :root{
    --bg:#0d130c; --panel:#16210f; --panel2:#1d2b13; --ink:#d9f2c0;
    --ork:#7ec02a; --ork2:#a6ff2e; --rust:#c2451f; --bone:#e8e2c8;
    --metal:#3a4a2c; --shadow:rgba(0,0,0,.55);
    --light:#b6cd86; --dark:#5d7a35;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;
    background:radial-gradient(120% 80% at 50% -10%, #1c2a12 0%, var(--bg) 60%) fixed;
    color:var(--ink);font-family:"Trebuchet MS",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}
  a{color:var(--ork2);text-decoration:none}
  h1{margin:0;font-size:30px;letter-spacing:2px;color:var(--ork2);text-transform:uppercase}
  h1 .tusk{color:var(--rust)}
  .tag{color:#9bbf6f;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin:6px 0 18px}
  .wrap{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;align-items:flex-start;max-width:880px}
  .board{display:grid;grid-template-columns:repeat(8,56px);grid-template-rows:repeat(8,56px);
    border:3px solid var(--metal);box-shadow:0 8px 30px var(--shadow)}
  .sq{display:flex;align-items:center;justify-content:center;font-size:38px;line-height:1;
    cursor:pointer;user-select:none;position:relative}
  .sq.light{background:var(--light)} .sq.dark{background:var(--dark)}
  .sq .pc.w{color:#fbfff0;text-shadow:0 1px 2px rgba(0,0,0,.6)}
  .sq .pc.b{color:#13210a;text-shadow:0 1px 1px rgba(255,255,255,.25)}
  .sq.sel{outline:3px solid var(--ork2);outline-offset:-3px}
  .sq.target::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;
    background:rgba(166,255,46,.55)}
  .sq.target.cap::after{width:46px;height:46px;border-radius:50%;background:none;
    border:4px solid rgba(194,69,31,.7)}
  .sq.last{box-shadow:inset 0 0 0 3px rgba(166,255,46,.35)}
  .panel{background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:2px solid var(--metal);border-top-color:#4d6336;border-radius:8px;
    padding:16px 18px;min-width:240px;max-width:300px}
  .panel h2{margin:0 0 10px;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--ork)}
  .status{font-size:15px;margin:0 0 12px;min-height:22px}
  .status b{color:var(--ork2)}
  .row{display:flex;gap:8px;align-items:center;margin:8px 0;font-size:13px;color:#9bbf6f}
  select,button{font-family:inherit}
  select{background:#0f1709;border:1px solid var(--metal);color:var(--bone);
    border-radius:4px;padding:5px 8px;font-size:13px;flex:1}
  button{cursor:pointer;background:#1a2810;color:var(--ink);border:1px solid var(--metal);
    border-radius:5px;padding:8px 12px;font-size:13px;letter-spacing:1px;text-transform:uppercase}
  button:hover{border-color:var(--ork);color:var(--ork2)}
  button.primary{border-color:var(--ork2);color:#0c1207;
    background:linear-gradient(180deg,var(--ork),#5d9320);font-weight:700}
  .moves{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--bone);
    background:#0f1709;border:1px solid var(--metal);border-radius:4px;padding:8px;
    max-height:160px;overflow:auto;white-space:pre-wrap;margin-top:8px}
  .raw{font-size:11px;color:#7d975a;margin-top:8px;word-break:break-word}
  .raw b{color:var(--ork2)}
  .legend{font-size:11px;color:#7d975a;margin-top:14px;line-height:1.6}
  .err{color:var(--rust)}
</style>
</head>
<body>
  <h1>GROT joue aux <span class="tusk">échecs</span></h1>
  <div class="tag">WAAAGH · GROT-80M · tu joues les blancs</div>
  <div class="wrap">
    <div id="board" class="board" aria-label="échiquier"></div>
    <div class="panel">
      <h2>Partie</h2>
      <p id="status" class="status">Chargement…</p>
      <div class="row">
        <span>Adversaire</span>
        <select id="model" title="modèle grot"></select>
      </div>
      <div class="row" style="gap:10px">
        <button id="new" class="primary" style="flex:1">Nouvelle partie</button>
        <button id="undo" style="flex:1">Annuler</button>
      </div>
      <div id="moves" class="moves"></div>
      <div id="raw" class="raw"></div>
      <div class="legend">
        Tu joues les <b>blancs</b> (en bas). Clique une pièce puis sa case.
        Promotion = dame. grot répond pour les <b>noirs</b>.<br>
        <a href="/">← retour démo</a>
      </div>
    </div>
  </div>

<script type="module">
import { Chess } from 'https://cdn.jsdelivr.net/npm/chess.js@1.4.0/+esm';

const PIECES = {
  wp:'♙', wn:'♘', wb:'♗', wr:'♖', wq:'♕', wk:'♔',
  bp:'♟', bn:'♞', bb:'♝', br:'♜', bq:'♛', bk:'♚',
};
const $ = (id) => document.getElementById(id);
const boardEl = $('board'), statusEl = $('status'), movesEl = $('moves'), rawEl = $('raw');

let game = new Chess();
let selected = null;          // selected source square e.g. 'e2'
let targets = [];             // legal target squares for the selection
let lastMove = null;          // {from,to} for highlight
let busy = false;             // grot is thinking — lock the board

function fileRank(row, col){ return 'abcdefgh'[col] + (8 - row); }

function render(){
  boardEl.innerHTML = '';
  const b = game.board();     // rank 8 first → row 0 is top (white perspective)
  for (let row = 0; row < 8; row++){
    for (let col = 0; col < 8; col++){
      const sq = fileRank(row, col);
      const cell = document.createElement('div');
      cell.className = 'sq ' + ((row + col) % 2 === 0 ? 'light' : 'dark');
      cell.dataset.sq = sq;
      const p = b[row][col];
      if (p){
        const span = document.createElement('span');
        span.className = 'pc ' + p.color;
        span.textContent = PIECES[p.color + p.type];
        cell.appendChild(span);
      }
      if (sq === selected) cell.classList.add('sel');
      if (targets.includes(sq)){
        cell.classList.add('target');
        if (p) cell.classList.add('cap');
      }
      if (lastMove && (sq === lastMove.from || sq === lastMove.to)) cell.classList.add('last');
      cell.addEventListener('click', () => onClick(sq));
      boardEl.appendChild(cell);
    }
  }
  renderStatus();
  renderMoves();
}

function renderMoves(){
  const h = game.history();
  let out = '';
  for (let i = 0; i < h.length; i += 2){
    out += `${i/2 + 1}. ${h[i] || ''} ${h[i+1] || ''}\n`;
  }
  movesEl.textContent = out.trim();
  movesEl.scrollTop = movesEl.scrollHeight;
}

function renderStatus(msg){
  if (msg){ statusEl.innerHTML = msg; return; }
  if (game.isCheckmate()){
    statusEl.innerHTML = game.turn() === 'w'
      ? 'Échec et mat — <b>grot gagne</b> 💀' : '<b>Échec et mat — tu gagnes</b> 🏆';
  } else if (game.isDraw()){
    statusEl.innerHTML = 'Partie nulle.';
  } else if (busy){
    statusEl.innerHTML = 'grot réfléchit…';
  } else if (game.turn() === 'w'){
    statusEl.innerHTML = game.isCheck() ? '<b>Échec !</b> À toi (blancs).' : 'À toi (blancs).';
  } else {
    statusEl.innerHTML = 'Aux noirs (grot).';
  }
}

function onClick(sq){
  if (busy || game.isGameOver() || game.turn() !== 'w') return;
  const piece = game.get(sq);
  if (selected && targets.includes(sq)){
    playerMove(selected, sq);
    return;
  }
  if (piece && piece.color === 'w'){
    selected = sq;
    targets = game.moves({ square: sq, verbose: true }).map(m => m.to);
  } else {
    selected = null; targets = [];
  }
  render();
}

function playerMove(from, to){
  let move;
  try { move = game.move({ from, to, promotion: 'q' }); }
  catch { move = null; }
  selected = null; targets = [];
  if (!move){ render(); return; }
  lastMove = { from: move.from, to: move.to };
  render();
  if (!game.isGameOver()) grotMove();
}

async function grotMove(){
  busy = true; rawEl.textContent = ''; renderStatus();
  const legal = game.moves();          // SAN list — chess.js is the legality authority
  const history = game.history();
  try {
    const res = await fetch('/api/chess/move', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        fen: game.fen(), legal_moves: legal, history,
        model: $('model').value || undefined,
      }),
    });
    const data = await res.json();
    if (data.error){ rawEl.innerHTML = `<span class="err">${data.error}</span>`; busy = false; renderStatus(); return; }
    let applied = null;
    try { applied = game.move(data.move); } catch { applied = null; }
    if (!applied){                       // server already guards, but stay safe
      applied = game.move(legal[Math.floor(Math.random()*legal.length)]);
      data.fallback = true;
    }
    lastMove = { from: applied.from, to: applied.to };
    rawEl.innerHTML = `grot: <b>${applied.san}</b>`
      + (data.fallback ? ' <span class="err">(coup de secours — pas un vrai choix)</span>'
                       : ` <span style="color:#7d975a">(${data.attempts||1} essai·s)</span>`);
  } catch (e){
    rawEl.innerHTML = `<span class="err">réseau: ${e}</span>`;
  }
  busy = false;
  render();
}

function newGame(){
  game = new Chess(); selected = null; targets = []; lastMove = null; busy = false;
  rawEl.textContent = ''; render();
}
function undo(){
  if (busy) return;
  game.undo(); game.undo();             // undo grot's reply + our move
  selected = null; targets = []; lastMove = null; render();
}

async function loadModels(){
  try {
    const meta = await (await fetch('/api/meta')).json();
    const sel = $('model');
    sel.innerHTML = '';
    (meta.models || []).forEach(m => {
      const o = document.createElement('option');
      o.value = m.id; o.textContent = m.label || m.id;
      if (m.id === meta.active_id) o.selected = true;
      sel.appendChild(o);
    });
    if (!(meta.models || []).length){
      const o = document.createElement('option');
      o.textContent = 'aucun modèle'; o.value = ''; sel.appendChild(o);
    }
  } catch { /* offline — grot endpoint will report */ }
}

$('new').addEventListener('click', newGame);
$('undo').addEventListener('click', undo);
loadModels();
render();
</script>
</body>
</html>
